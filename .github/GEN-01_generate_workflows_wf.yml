---
name: "GEN-01: Workflow Generator"

on:
  schedule:
    - cron: '0 7 * * *'

  workflow_dispatch:
    inputs:
      inventory_branch:
        description: "Override the inventories branch"
        type: string
        default: "main"
        required: true
      workflows_branch:
        description: "The iaas-workflows branch"
        type: string
        required: false
        default: main

jobs:
  call_generate_workflows:
    name: "Call workflow generator"
    uses: "lakshmivilla1031/iaas-workflows/.github/workflows/001_generate_workflows_wf.yml@main"
    strategy:
      matrix:
        environment:
          - "dev"
          - "perf"
          - "prod"
          - "tools"
    with:
      namespace: "airoffer"
      tp_env: "${{ matrix.environment }}"
      inventory_branch: "${{ inputs.inventory_branch }}"
      workflows_branch: "${{ inputs.workflows_branch }}"

    secrets:
      token: "${{ secrets.IAAS_WORKFLOWS_PAT }}"
      ansible_vault_key: "${{ secrets.ANSIBLE_VAULT_KEY }}"

  call_generate_workflows_main:
    name: "Call workflow generator main"
    needs: call_generate_workflows
    uses: "lakshmivilla1031/iaas-workflows/.github/workflows/001_generate_workflows_wf.yml@main"
    with:
      namespace: "airoffer"
      tp_env: "main"
      inventory_branch: "${{ inputs.inventory_branch }}"
      workflows_branch: "${{ inputs.workflows_branch }}"

    secrets:
      token: "${{ secrets.IAAS_WORKFLOWS_PAT }}"
      ansible_vault_key: "${{ secrets.ANSIBLE_VAULT_KEY }}"

  repository_dispatch:
    name: "Create repository dispatch event"
    needs: call_generate_workflows_main
    runs-on:
      - self-hosted
      - base-runner
    steps:
      - name: Run repository dispatch
        uses: peter-evans/repository-dispatch@v3.0.0
        with:
          token: "${{ secrets.IAAS_WORKFLOWS_PAT }}"
          event-type: generate_workflow

